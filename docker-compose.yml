services:

# Message broker services
  kafka-init:
    image: confluentinc/cp-kafka:7.5.0
    container_name: hackathon_kafka_init
    restart: "no"
    depends_on:
      kafka:
        condition: service_healthy
    networks:
      - hackathon_net
    command: >
      bash -c "
        kafka-topics --create --if-not-exists
          --bootstrap-server kafka:29092
          --topic sensors.raw
          --partitions 1
          --replication-factor 1 &&
        kafka-topics --create --if-not-exists
          --bootstrap-server kafka:29092
          --topic sensors.predicted
          --partitions 1
          --replication-factor 1 &&
        echo 'Topics créés :' &&
        kafka-topics --list --bootstrap-server kafka:29092
      "

  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: hackathon_zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    healthcheck:
      test: ["CMD", "bash", "-c", "zookeeper-shell localhost:2181 ls / > /dev/null 2>&1"]
      interval: 10s
      timeout: 10s
      retries: 10
      start_period: 15s
    networks:
      - hackathon_net

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: hackathon_kafka
    depends_on:
      zookeeper:
        condition: service_healthy
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    healthcheck:
      test: ["CMD", "kafka-broker-api-versions", "--bootstrap-server", "localhost:9092"]
      interval: 10s
      timeout: 10s
      retries: 10
    networks:
      - hackathon_net

# Base de données 
  postgres:
    image: postgres:16-alpine
    container_name: hackathon_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-hackathon}
      POSTGRES_USER: ${POSTGRES_USER:-hackathon}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-hackathon}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./services/postgres/migrations:/docker-entrypoint-initdb.d
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-hackathon}"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - hackathon_net

  init:
    build: ./services/backend
    container_name: hackathon_init
    restart: "no"
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-hackathon}:${POSTGRES_PASSWORD:-hackathon}@postgres:5432/${POSTGRES_DB:-hackathon}
    command: ["python", "-m", "app.init_db"]
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - hackathon_net
    volumes:
      - ./services/backend:/app

# Application (API + calculateur)
  backend:
    build: ./services/backend
    container_name: hackathon_backend
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-hackathon}:${POSTGRES_PASSWORD:-hackathon}@postgres:5432/${POSTGRES_DB:-hackathon}
      KAFKA_BOOTSTRAP: kafka:29092
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
    networks:
      - hackathon_net
    volumes:
      - ./services/backend:/app

  consumer:
    build: ./services/backend
    container_name: hackathon_consumer
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-hackathon}:${POSTGRES_PASSWORD:-hackathon}@postgres:5432/${POSTGRES_DB:-hackathon}
      KAFKA_BOOTSTRAP: kafka:29092
    command: ["python", "-m", "app.kafka_consumer"]
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
    networks:
      - hackathon_net
    volumes:
      - ./services/backend:/app

  producer:
    build: ./services/producer
    container_name: hackathon_producer
    restart: unless-stopped
    environment:
      KAFKA_BOOTSTRAP: kafka:29092
      SEND_INTERVAL: "2"
    depends_on:
      kafka:
        condition: service_healthy
    networks:
      - hackathon_net
    volumes:
      - ./services/producer:/app
      - ./data/dataset_ia_72h_sync.jsonl:/dataset.jsonl:ro

# Interface utilisateur
  frontend:
    build: ./services/frontend
    container_name: hackathon_frontend
    restart: unless-stopped
    environment:
      API_URL: http://backend:8000
    ports:
      - "8080:8080"
    depends_on:
      - backend
    networks:
      - hackathon_net

# Service d'IA (LLM)
  ai:
    build: ./services/ai
    container_name: hackathon_ai
    restart: unless-stopped
    ports:
      - "8001:8001"
    networks:
      - hackathon_net

volumes:
  postgres_data:

networks:
  hackathon_net:
    driver: bridge