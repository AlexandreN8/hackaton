server {
    listen 8080;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Proxy vers le backend — toutes les routes API (GET et POST)
    location ~ ^/(referentiel|calculate|history|rt|stream-reco|health) {
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_http_version 1.1;

        # Autorise explicitement toutes les méthodes HTTP
        proxy_method $request_method;

        # SSE — désactiver le buffering pour /stream-reco
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 300s;
        proxy_connect_timeout 10s;
    }

    # SPA fallback — toutes les autres routes → index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    gzip on;
    gzip_types text/plain text/css application/javascript application/json;
}