name: Build Check

on:
  pull_request: ## le pull request ici est fait expré
    branches: [ main ] 

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Set up Docker
      uses: docker/setup-buildx-action@v2
    
    - name: Build all services
      run: docker-compose build
